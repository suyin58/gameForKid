# ========================================
# 方案1：单容器部署（应用 + SQLite）
# ========================================
# 适合：开发测试、小型部署
# 特点：简单快速、数据库内置、易于维护

version: '3.8'

services:
  # 后端应用服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kidsgame-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # 生产环境
      - NODE_ENV=production
      - PORT=3001
      - DB_TYPE=sqlite
      # JWT密钥（生产环境请修改）
      - JWT_SECRET=kidsgame-production-secret-change-me
      # AI服务配置（可选）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      - OPENAI_MODEL=${OPENAI_MODEL:-glm-4-plus}
    volumes:
      # 数据持久化 - SQLite数据库
      - ./data:/app/data
      # 日志持久化
      - ./logs:/app/server/logs
    networks:
      - kidsgame-network
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

# 网络配置
networks:
  kidsgame-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ========================================
# 使用说明
# ========================================
# 1. 构建镜像:
#    docker compose -f docker-compose-simple.yml build
#
# 2. 启动服务:
#    docker compose -f docker-compose-simple.yml up -d
#
# 3. 查看日志:
#    docker compose -f docker-compose-simple.yml logs -f
#
# 4. 停止服务:
#    docker compose -f docker-compose-simple.yml down
#
# 5. 重启服务:
#    docker compose -f docker-compose-simple.yml restart
#
# 6. 查看状态:
#    docker compose -f docker-compose-simple.yml ps
#
# 7. 进入容器:
#    docker compose -f docker-compose-simple.yml exec backend sh
#
# 8. 健康检查:
#    curl http://localhost:3001/health
